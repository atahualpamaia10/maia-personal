<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>maiaeconomias</title>
<meta name="theme-color" content="#0E3B2C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="maiaeconomias">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&display=swap" rel="stylesheet">
<script>(function(){var p=localStorage.getItem('cofre.theme');var d=p?p==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');})();</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ptr" class="ptr"><span class="ptr-ico"></span></div>

<header class="top">
  <div class="top-inner">
    <div class="brand"><span>maia</span><span class="b2">economias</span></div>
    <nav class="tabs">
      <button class="tab is-active" data-view="home">Início</button>
      <button class="tab" data-view="ledger">Transações</button>
      <button class="tab" data-view="accounts">Contas</button>
      <button class="tab" data-view="categories">Categorias</button>
    </nav>
    <div class="top-actions">
      <button id="theme" class="iconbtn" title="Alternar tema" aria-label="Alternar tema">☾</button>
      <button id="logout" class="logout" title="Sair da conta" hidden>sair</button>
    </div>
  </div>
</header>

<main id="view" class="wrap"></main>

<button id="fab" class="fab" title="Adicionar transação" aria-label="Adicionar transação">+</button>

<!-- ── Form de transação ─────────────────────────────── -->
<dialog id="txModal" class="sheet">
  <form id="txForm" method="dialog" novalidate>
    <div class="sheet-head">
      <h2 id="txTitle">Nova transação</h2>
      <button type="button" class="x" data-close>&times;</button>
    </div>

    <div class="seg" id="typeSeg">
      <button type="button" data-type="expense"  class="is-active">Despesa</button>
      <button type="button" data-type="income">Receita</button>
      <button type="button" data-type="transfer">Transferência</button>
    </div>

    <div class="grid2">
      <label>Data
        <input type="date" name="date" required>
      </label>
      <label>Valor
        <input type="text" name="amount" inputmode="decimal" placeholder="0,00" autocomplete="off" required>
      </label>
    </div>

    <label>Descrição
      <input type="text" name="description" placeholder="Descrição" autocomplete="off">
    </label>

    <label data-f="category">Categoria
      <select name="category"></select>
    </label>

    <div class="grid2">
      <label><span id="accLabel">Conta</span>
        <select name="account"></select>
      </label>
      <label data-f="accountTo">Conta destino
        <select name="accountTo"></select>
      </label>
    </div>

    <fieldset class="rep" data-f="repeat">
      <legend>Repetir</legend>
      <div class="rep-opts">
        <label class="radio"><input type="radio" name="repeat" value="none" checked> Sem repetição</label>
        <label class="radio"><input type="radio" name="repeat" value="installment"> Parcelamento mensal</label>
        <label class="radio"><input type="radio" name="repeat" value="recurring"> Todo mês (indefinido)</label>
      </div>
      <label class="nparc" data-f="nparc">Nº de parcelas
        <input type="number" name="installments" min="2" max="240" value="12">
      </label>
    </fieldset>

    <label class="radio cleared-row">
      <input type="checkbox" name="cleared"> Consolidada
    </label>

    <div class="sheet-actions">
      <button type="button" class="btn ghost danger" id="txDelete" hidden>Excluir</button>
      <span class="spacer"></span>
      <button type="button" class="btn ghost" data-close>Cancelar</button>
      <button type="submit" class="btn primary" id="txSave">Salvar</button>
    </div>
  </form>
</dialog>

<!-- ── Login ─────────────────────────────────────────── -->
<dialog id="authModal" class="auth">
  <form id="authForm" novalidate>
    <div class="auth-mark"><span>maia</span><span class="b2">economias</span></div>
    <label class="auth-field">
      <span>Email</span>
      <input type="email" name="email" autocomplete="username" placeholder="voce@email.com" required>
    </label>
    <label class="auth-field">
      <span>Senha</span>
      <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
    </label>
    <p class="auth-error" id="authError" hidden></p>
    <button type="submit" class="btn primary auth-submit" id="authSubmit">Entrar</button>
  </form>
</dialog>

<!-- ── Conta (add/editar) ────────────────────────────── -->
<dialog id="accModal" class="pop">
  <form id="accForm" novalidate>
    <h3 id="accTitle">Nova conta</h3>
    <label class="fld">Nome
      <input type="text" name="accname" autocomplete="off" required>
    </label>
    <label class="fld">Saldo inicial
      <input type="text" name="initial" inputmode="decimal" placeholder="0,00" autocomplete="off">
    </label>
    <div class="pop-actions row">
      <button type="button" class="btn ghost" data-cancel>Cancelar</button>
      <button type="submit" class="btn primary">Salvar</button>
    </div>
  </form>
</dialog>

<!-- ── Prompt (1 campo) ──────────────────────────────── -->
<dialog id="promptModal" class="pop">
  <form id="promptForm" novalidate>
    <h3 id="promptTitle"></h3>
    <label class="fld"><span id="promptLabel"></span>
      <input type="text" name="field" autocomplete="off" required>
    </label>
    <div class="pop-actions row">
      <button type="button" class="btn ghost" data-cancel>Cancelar</button>
      <button type="submit" class="btn primary">OK</button>
    </div>
  </form>
</dialog>

<!-- ── Confirmar ─────────────────────────────────────── -->
<dialog id="confirmModal" class="pop">
  <h3 id="confirmTitle"></h3>
  <p class="hint" id="confirmMsg"></p>
  <div class="pop-actions row">
    <button class="btn ghost" data-confirm="0">Cancelar</button>
    <button class="btn primary" id="confirmOk" data-confirm="1">Confirmar</button>
  </div>
</dialog>

<!-- ── Escopo (série) ────────────────────────────────── -->
<dialog id="scopeModal" class="pop">
  <h3 id="scopeTitle">Aplicar em</h3>
  <p class="hint" id="scopeHint"></p>
  <div class="pop-actions">
    <button class="btn" data-scope="one">Só esta</button>
    <button class="btn" data-scope="future">Esta e as futuras</button>
    <button class="btn ghost" data-scope="cancel">Cancelar</button>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="store.js"></script>
<script src="app.js"></script>
<script>if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));</script>
</body>
</html>
